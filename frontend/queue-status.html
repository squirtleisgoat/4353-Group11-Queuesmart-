<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QueueSmart - Queue Status</title>
    <link rel="stylesheet" href="styles.css">
</head> 
<body>

    <h1>Queue Status</h1>
    <div class="card">
        <button id="simulateBtn">Simulate queue update</button>

        <div class="ticket">
            <span class="ticket-label">Your position</span>
            <span id="position">5</span>
        </div>    
        <p>Estimated waiting time: <span id="waitTime">~25 min</span></p>
        <p>Status: <span id="status">Waiting</span></p>
    </div>    

    <script src="queue-status.js"></script>
</body>   
</html>
