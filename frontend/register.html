<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>QueueSmart</h1>
    <h2>Create an Account</h2>

    <div id="error-message" class="error-box" style="display:none;"></div>
    <div id="success-message" class="success-box" style="display:none;"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" maxlength="100">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="">-- Select a Role --</option>
        <option value="user">User</option>
        <option value="admin">Administrator</option>
      </select>
    </div>

    <button onclick="handleRegister()">Register</button>

    <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>

  </div>

  <script src="auth.js"></script>
</body>
</html>
