<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>QueueSmart</h1>
    <h2>Login</h2>

    <div id="error-message" class="error-box" style="display:none;"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" maxlength="100">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button onclick="handleLogin()">Login</button>

    <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>

  </div>

  <script src="auth.js"></script>
</body>
</html>
